.force("x",d3.forceX(W/2).strength(0.015))
.force("y",d3.forceY(H/2).strength(0.015));

const link=g.append("g").selectAll("line").data(L).join("line").attr("stroke","rgba(148,163,184,0.1)").attr("stroke-width",1.3);
const node=g.append("g").selectAll("g").data(N).join("g").call(d3.drag()
.on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
.on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y})
.on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

node.append("circle").attr("r",d=>d.r)
.attr("fill",d=>d.id==="center"?"#0f172a":`${C[d.cat].color}12`)
.attr("stroke",d=>C[d.cat].color)
.attr("stroke-width",d=>d.r>=34?2.5:1.8)
.attr("filter",d=>d.r>=28?"url(#glow)":null)
.style("cursor","pointer");

node.append("text").attr("text-anchor","middle").attr("dominant-baseline","central")
.attr("fill",d=>C[d.cat].color)
.attr("font-size",d=>d.r>=36?"13px":d.r>=26?"11px":d.r>=20?"9.5px":"8px")
.attr("font-weight",d=>d.r>=28?"700":"600")
.attr("font-family","DM Sans,sans-serif")
.style("pointer-events","none")
.each(function(d){const lines=d.label.split("\n");const el=d3.select(this);lines.forEach((l,i)=>{el.append("tspan").attr("x",0).attr("dy",i===0?`${-(lines.length-1)*0.5}em`:"1.15em").text(l)})});

const tooltip=document.getElementById("tooltip");
node.on("mouseover",function(e,d){
d3.select(this).select("circle").transition().duration(200).attr("stroke-width",4).attr("fill",`${C[d.cat].color}28`);
link.attr("stroke",l=>(l.source.id===d.id||l.target.id===d.id)?C[d.cat].color+"50":"rgba(148,163,184,0.05)").attr("stroke-width",l=>(l.source.id===d.id||l.target.id===d.id)?2.5:1);
tooltip.style.opacity=1;tooltip.textContent=d.detail?.tag||d.label.replace(/\n/g," ");
tooltip.style.left=(e.clientX+18)+"px";tooltip.style.top=(e.clientY-12)+"px";
}).on("mousemove",e=>{tooltip.style.left=(e.clientX+18)+"px";tooltip.style.top=(e.clientY-12)+"px"})
.on("mouseout",function(e,d){
d3.select(this).select("circle").transition().duration(200).attr("stroke-width",d.r>=34?2.5:1.8).attr("fill",d.id==="center"?"#0f172a":`${C[d.cat].color}12`);
link.attr("stroke","rgba(148,163,184,0.1)").attr("stroke-width",1.3);tooltip.style.opacity=0;
});
node.on("click",(e,d)=>{if(!d.detail)return;const p=document.getElementById("panel");const c=C[d.cat].color;
document.getElementById("panel-tag").textContent=d.detail.tag;
document.getElementById("panel-tag").style.cssText=`background:${c}20;color:${c};font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:8px`;
document.getElementById("panel-title").textContent=d.detail.title;
document.getElementById("panel-body").innerHTML=d.detail.body;p.classList.add("open");
});
function closePanel(){document.getElementById("panel").classList.remove("open")}
sim.on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);node.attr("transform",d=>`translate(${d.x},${d.y})`)});
document.getElementById("force-slider").addEventListener("input",function(){sim.force("center").strength(this.value/1000);sim.alpha(0.5).restart()});
document.getElementById("repulsion-slider").addEventListener("input",function(){sim.force("charge").strength(-this.value);sim.alpha(0.5).restart()});
const cEl=document.getElementById("controls");
[{key:"all",label:"All"},{key:"kaplan",label:"\u2B50 Kaplan Partners"},{key:"tier1",label:"\uD83E\uDD47 Priority 1"},{key:"tier2",label:"\uD83E\uDD48 Priority 2"},{key:"tier3",label:"\uD83E\uDD49 Priority 3"},{key:"family",label:"\uD83C\uDF93 Students"}].forEach(f=>{
const b=document.createElement("button");b.className=`ctrl-btn${f.key==="all"?" active":""}`;b.textContent=f.label;
b.onclick=()=>{document.querySelectorAll(".ctrl-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");
if(f.key==="all"){node.style("opacity",1);link.style("opacity",1)}else{
node.style("opacity",d=>(d.cat===f.key||d.id==="center")?1:0.08);
link.style("opacity",l=>(l.source?.cat===f.key||l.target?.cat===f.key)?0.5:0.02)}};cEl.appendChild(b)});
window.addEventListener("resize",()=>{const w=window.innerWidth,h=window.innerHeight;svg.attr("width",w).attr("height",h);sim.force("center",d3.forceCenter(w/2,h/2).strength(0.03));sim.alpha(0.3).restart()});
</script>


</body></html>
